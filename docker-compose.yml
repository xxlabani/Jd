version: '3.8'

services:
  bot:
    build: .
    container_name: jd-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=UTC
    volumes:
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./config:/app/config:ro
    ports:
      - "8080:8080"  # Health check port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jd-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: JDownloader service
  jdownloader:
    image: jlesage/jdownloader-2
    container_name: jdownloader
    restart: unless-stopped
    environment:
      - USER_ID=1000
      - GROUP_ID=1000
      - JD_EMAIL=${JD_EMAIL}
      - JD_PASSWORD=${JD_PASSWORD}
      - JD_DEVICE_NAME=${JD_DEVICE_NAME}
    volumes:
      - ./jd-config:/config
      - ./downloads:/output:rw
    ports:
      - "3129:3129"  # JDownloader remote control
    networks:
      - jd-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  jd-network:
    driver: bridge
