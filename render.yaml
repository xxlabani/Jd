services:
  - type: web
    name: jd-telegram-bot
    env: docker
    repo: https://github.com/yourusername/jd-telegram-bot
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: JD_EMAIL
        sync: false
      - key: JD_PASSWORD
        sync: false
      - key: JD_DEVICE_NAME
        value: RenderBot
      - key: ALLOWED_USERS
        value: ""
      - key: MAX_FILE_SIZE
        value: "2000"
      - key: LOG_LEVEL
        value: "INFO"
    healthCheckPath: /health
    disk:
      name: downloads
      mountPath: /app/downloads
      sizeGB: 10
    autoDeploy: true

  - type: cron
    name: jd-cleanup
    env: docker
    schedule: "0 0 * * *"  # Daily at midnight
    dockerfilePath: ./Dockerfile
    dockerContext: .
    command: python -c "from jd_client import JDownloaderClient; import asyncio; asyncio.run(JDownloaderClient().cleanup_completed())"
    envVars:
      - key: JD_EMAIL
        sync: false
      - key: JD_PASSWORD
        sync: false
